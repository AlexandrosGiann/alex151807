<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Διαδραστικά Κουίζ | Αλέξανδρος Γιαννάκης</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #1e293b;
      --card-hover: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #38bdf8;
      --primary-glow: rgba(56, 189, 248, 0.15);
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.15);
      --error: #ef4444;
      --error-glow: rgba(239, 68, 68, 0.15);
      --border-color: #475569;
      --font-outfit: 'Outfit', sans-serif;
      --font-inter: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-inter);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .nav-bar {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: var(--primary);
      background-color: var(--primary-glow);
    }

    .page-title {
      font-family: var(--font-outfit);
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 10px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Card styling with glassmorphism */
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
    }

    /* Dashboard styling */
    .quiz-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 600px) {
      .quiz-grid {
        grid-template-columns: 1fr 1fr;
      }
      .quiz-grid .card:last-child {
        grid-column: span 2;
      }
    }

    .quiz-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 15px;
    }

    .quiz-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.1), 0 10px 10px -5px rgba(56, 189, 248, 0.04);
      background-color: var(--card-hover);
      border-color: var(--primary);
    }

    .unit-tag {
      display: inline-block;
      align-self: flex-start;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background-color: rgba(56, 189, 248, 0.15);
      color: var(--primary);
      margin-bottom: 5px;
    }

    .quiz-card-title {
      font-family: var(--font-outfit);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-main);
    }

    .quiz-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Active Quiz Screen */
    .hidden {
      display: none !important;
    }

    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8 0%, #10b981 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .question-title {
      font-family: var(--font-outfit);
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 25px;
      color: var(--text-main);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 15px 20px;
      color: var(--text-main);
      font-size: 0.98rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all 0.2s ease;
      line-height: 1.5;
    }

    .option-btn:hover:not(:disabled) {
      background-color: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .option-btn:disabled {
      cursor: not-allowed;
    }

    .option-marker {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      background-color: rgba(0, 0, 0, 0.2);
      color: var(--text-muted);
      transition: all 0.2s ease;
      margin-top: 1px;
    }

    .option-btn:hover:not(:disabled) .option-marker {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* State Styles for Options */
    .option-btn.selected-correct {
      background-color: var(--success-glow);
      border-color: var(--success);
      color: white;
    }

    .option-btn.selected-correct .option-marker {
      background-color: var(--success);
      border-color: var(--success);
      color: white;
    }

    .option-btn.selected-incorrect {
      background-color: var(--error-glow);
      border-color: var(--error);
      color: white;
    }

    .option-btn.selected-incorrect .option-marker {
      background-color: var(--error);
      border-color: var(--error);
      color: white;
    }

    .option-btn.correct-reveal {
      background-color: var(--success-glow);
      border-color: var(--success);
    }

    .option-btn.correct-reveal .option-marker {
      background-color: var(--success);
      border-color: var(--success);
      color: white;
    }

    .action-row {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #7dd3fc;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: var(--text-main);
    }

    /* Shake animation for error state */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    /* Circular Score Summary Styling */
    .results-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
    }

    .score-circle-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 15px 0;
    }

    .score-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 12;
    }

    .score-fill {
      fill: none;
      stroke: var(--success);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 1.5s ease-out;
    }

    .score-text-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-number {
      font-family: var(--font-outfit);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .score-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .result-feedback-title {
      font-family: var(--font-outfit);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .result-feedback-text {
      font-size: 0.98rem;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 500px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Review Area */
    .review-section {
      margin-top: 30px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .review-title-text {
      font-family: var(--font-outfit);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .review-item {
      background-color: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .review-item-q {
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.45;
      color: var(--text-main);
    }

    .review-opt {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.4;
    }

    .review-opt-correct {
      background-color: rgba(16, 185, 129, 0.08);
      border: 1px solid var(--success);
      color: #a7f3d0;
    }

    .review-opt-incorrect {
      background-color: rgba(239, 68, 68, 0.08);
      border: 1px solid var(--error);
      color: #fca5a5;
    }

    .review-opt-neutral {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    .review-opt-marker {
      font-weight: 700;
      font-size: 0.8rem;
      margin-top: 1px;
    }

    /* Custom audio control overlay */
    .sound-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      color: var(--text-muted);
      transition: all 0.2s ease;
      z-index: 1000;
    }

    .sound-toggle:hover {
      color: var(--text-main);
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .sound-toggle.muted {
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- Background sound settings -->
  <button id="soundToggle" class="sound-toggle" title="Ενεργοποίηση/Απενεργοποίηση Ήχου">

  <header>
    <div class="nav-bar">

  <main class="container">
    
    <!-- DASHBOARD SECTION -->
    <section id="dashboardSection" class="quiz-grid">
      <!-- Cards will be populated by JS -->
    </section>

    <!-- ACTIVE QUIZ SECTION -->
    <section id="quizSection" class="card hidden">
      <div class="progress-section">
        <div class="progress-header">
          <span id="quizUnitText">ΕΝΟΤΗΤΑ 1</span>

      <div class="button-group">

  <!-- Embedded Quiz Data & Core Script -->

          let optClass = 'review-opt-neutral';
          let statusIndicator = '';
          
          if (optIdx === correctIdx) {
            optClass = 'review-opt-correct';
            statusIndicator = ' (Σωστό)';
          } else if (optIdx === userChoiceIdx && !isUserCorrect) {
            optClass = 'review-opt-incorrect';
            statusIndicator = ' (Η επιλογή σας)';
          }
          
          optionsMarkup += `
            <div class="review-opt ${optClass}">
              <span class="review-opt-marker">${optMarker}.</span>
              <span>${opt}${statusIndicator}</span>
            </div>
          `;
        });
        
        reviewItem.innerHTML = `
          <div class="review-item-q">${idx + 1}. ${q.text}</div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            ${optionsMarkup}
          </div>
        `;
        reviewContainer.appendChild(reviewItem);
      });
    }

    // Restart Quiz
    restartBtn.addEventListener('click', () => {
      startQuiz(currentQuizIndex);
    });

    // Go Back to Dashboard
    backBtn.addEventListener('click', () => {
      resultsSection.classList.add('hidden');
      quizSection.classList.add('hidden');
      dashboardSection.classList.remove('hidden');
      initDashboard();
    });

    // Initialize Page
    initDashboard();
  </script>
</body>
</html>
