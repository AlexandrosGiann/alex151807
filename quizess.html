<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Διαδραστικά Κουίζ | Αλέξανδρος Γιαννάκης</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #1e293b;
      --card-hover: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #38bdf8;
      --primary-glow: rgba(56, 189, 248, 0.15);
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.15);
      --error: #ef4444;
      --error-glow: rgba(239, 68, 68, 0.15);
      --border-color: #475569;
      --font-outfit: 'Outfit', sans-serif;
      --font-inter: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-inter);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    header {
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .nav-bar {
      display: flex;
      gap: 15px;
      margin-bottom: 10px;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .nav-link:hover {
      color: var(--text-main);
      background-color: rgba(255, 255, 255, 0.05);
    }

    .nav-link.active {
      color: var(--primary);
      background-color: var(--primary-glow);
    }

    .page-title {
      font-family: var(--font-outfit);
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 10px;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Card styling with glassmorphism */
    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      width: 100%;
    }

    /* Dashboard styling */
    .quiz-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 600px) {
      .quiz-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .quiz-card {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 15px;
    }

    .quiz-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgba(56, 189, 248, 0.1), 0 10px 10px -5px rgba(56, 189, 248, 0.04);
      background-color: var(--card-hover);
      border-color: var(--primary);
    }

    .unit-tag {
      display: inline-block;
      align-self: flex-start;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background-color: rgba(56, 189, 248, 0.15);
      color: var(--primary);
      margin-bottom: 5px;
    }

    .quiz-card-title {
      font-family: var(--font-outfit);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-main);
    }

    .quiz-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Active Quiz Screen */
    .hidden {
      display: none !important;
    }

    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8 0%, #10b981 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .question-title {
      font-family: var(--font-outfit);
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 25px;
      color: var(--text-main);
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 15px 20px;
      color: var(--text-main);
      font-size: 0.98rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all 0.2s ease;
      line-height: 1.5;
    }

    .option-btn:hover:not(:disabled) {
      background-color: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      transform: translateX(4px);
    }

    .option-btn:disabled {
      cursor: not-allowed;
    }

    .option-marker {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      background-color: rgba(0, 0, 0, 0.2);
      color: var(--text-muted);
      transition: all 0.2s ease;
      margin-top: 1px;
    }

    .option-btn:hover:not(:disabled) .option-marker {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* State Styles for Options */
    .option-btn.selected-correct {
      background-color: var(--success-glow);
      border-color: var(--success);
      color: white;
    }

    .option-btn.selected-correct .option-marker {
      background-color: var(--success);
      border-color: var(--success);
      color: white;
    }

    .option-btn.selected-incorrect {
      background-color: var(--error-glow);
      border-color: var(--error);
      color: white;
    }

    .option-btn.selected-incorrect .option-marker {
      background-color: var(--error);
      border-color: var(--error);
      color: white;
    }

    .option-btn.correct-reveal {
      background-color: var(--success-glow);
      border-color: var(--success);
    }

    .option-btn.correct-reveal .option-marker {
      background-color: var(--success);
      border-color: var(--success);
      color: white;
    }

    .action-row {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      background-color: #7dd3fc;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: var(--text-main);
    }

    /* Shake animation for error state */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .shake {
      animation: shake 0.4s ease-in-out;
    }

    .results-quiz-title {
      font-family: var(--font-outfit);
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 5px;
      text-align: center;
    }

    /* Circular Score Summary Styling */
    .results-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 20px;
    }

    .score-circle-wrapper {
      position: relative;
      width: 160px;
      height: 160px;
      margin: 15px 0;
    }

    .score-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 12;
    }

    .score-fill {
      fill: none;
      stroke: var(--success);
      stroke-width: 12;
      stroke-linecap: round;
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 1.5s ease-out;
    }

    .score-text-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .score-number {
      font-family: var(--font-outfit);
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
    }

    .score-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .result-feedback-title {
      font-family: var(--font-outfit);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .result-feedback-text {
      font-size: 0.98rem;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 500px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Review Area */
    .review-section {
      margin-top: 30px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .review-title-text {
      font-family: var(--font-outfit);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .review-item {
      background-color: rgba(255, 255, 255, 0.015);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .review-item-q {
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.45;
      color: var(--text-main);
    }

    .review-opt {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      line-height: 1.4;
    }

    .review-opt-correct {
      background-color: rgba(16, 185, 129, 0.08);
      border: 1px solid var(--success);
      color: #a7f3d0;
    }

    .review-opt-incorrect {
      background-color: rgba(239, 68, 68, 0.08);
      border: 1px solid var(--error);
      color: #fca5a5;
    }

    .review-opt-neutral {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    .review-opt-marker {
      font-weight: 700;
      font-size: 0.8rem;
      margin-top: 1px;
    }

    /* Custom audio control overlay */
    .sound-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      color: var(--text-muted);
      transition: all 0.2s ease;
      z-index: 1000;
    }

    .sound-toggle:hover {
      color: var(--text-main);
      border-color: var(--primary);
      transform: scale(1.05);
    }

    .sound-toggle.muted {
      opacity: 0.6;
    }

    /* Print styling to save beautifully as PDF */
    @media print {
      @page {
        margin: 15mm;
      }
      body {
        background-color: #ffffff !important;
        color: #000000 !important;
      }
      header, .nav-bar, .sound-toggle, .button-group, #dashboardSection, #quizSection {
        display: none !important;
      }
      .results-quiz-title {
        color: #000000 !important;
        font-size: 2rem !important;
        margin-bottom: 20px !important;
        text-align: center !important;
      }
      .score-label {
        color: #475569 !important;
      }
      .results-card {
        background-color: #ffffff !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        text-align: center !important;
      }
      .container {
        max-width: 100% !important;
        width: 100% !important;
        padding: 0 !important;
      }
      .card {
        background-color: #ffffff !important;
        color: #000000 !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      /* Ensure SVG scores look good in print */
      .score-bg {
        stroke: #f1f5f9 !important;
      }
      .score-fill {
        stroke: #10b981 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .score-number {
        color: #000000 !important;
      }
      .result-feedback-title {
        color: #000000 !important;
      }
      .result-feedback-text {
        color: #475569 !important;
      }
      .review-title-text {
        color: #000000 !important;
        border-bottom-color: #cbd5e1 !important;
      }
      .review-item {
        background-color: #ffffff !important;
        border: 1px solid #e2e8f0 !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      .review-item-q {
        color: #000000 !important;
      }
      .review-opt {
        border-width: 1px !important;
        border-style: solid !important;
      }
      .review-opt-correct {
        background-color: #f0fdf4 !important;
        border-color: #10b981 !important;
        color: #14532d !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .review-opt-incorrect {
        background-color: #fef2f2 !important;
        border-color: #ef4444 !important;
        color: #7f1d1d !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .review-opt-neutral {
        background-color: #f8fafc !important;
        border-color: #e2e8f0 !important;
        color: #475569 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>

  <!-- Background sound settings -->
  <button id="soundToggle" class="sound-toggle" title="Ενεργοποίηση/Απενεργοποίηση Ήχου">
    <svg id="soundOnIcon" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    <svg id="soundMutedIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
  </button>

  <header>
    <div class="nav-bar">
      <a href="index.html" class="nav-link">Αρχική</a>
      <a href="papers.html" class="nav-link">Έρευνες</a>
      <a href="quizess.html" class="nav-link active">Κουίζ</a>
    </div>
    <h1 class="page-title">Διαδραστικά Κουίζ</h1>
  </header>

  <main class="container">
    
    <!-- DASHBOARD SECTION -->
    <section id="dashboardSection" class="quiz-grid">
      <!-- Cards will be populated by JS -->
    </section>

    <!-- ACTIVE QUIZ SECTION -->
    <section id="quizSection" class="card hidden">
      <div class="progress-section">
        <div class="progress-header">
          <span id="quizUnitText">ΕΝΟΤΗΤΑ 1</span>
          <span id="progressText">Ερώτηση 1 από 10</span>
        </div>
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>
      
      <div id="questionContainer">
        <h2 id="questionTitle" class="question-title">Φόρτωση ερώτησης...</h2>
        <div id="optionsList" class="options-list">
          <!-- Options will be populated by JS -->
        </div>
      </div>

      <div class="action-row">
        <button id="nextBtn" class="btn btn-primary" disabled>
          Επόμενο
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
      </div>
    </section>

    <!-- RESULTS SECTION -->
    <section id="resultsSection" class="card results-card hidden">
      <h1 id="resultsQuizTitle" class="results-quiz-title"></h1>
      <div class="score-circle-wrapper">
        <svg class="score-svg" viewBox="0 0 160 160">
          <circle class="score-bg" cx="80" cy="80" r="70"></circle>
          <circle id="scoreFill" class="score-fill" cx="80" cy="80" r="70"></circle>
        </svg>
        <div class="score-text-center">
          <div id="scoreNumber" class="score-number">0%</div>
          <div class="score-label">Σκορ</div>
        </div>
      </div>

      <h2 id="resultFeedbackTitle" class="result-feedback-title">Συγχαρητήρια!</h2>
      <p id="resultFeedbackText" class="result-feedback-text">Ολοκληρώσατε το κουίζ. Δείτε τις απαντήσεις σας παρακάτω.</p>

      <div class="button-group">
        <button id="restartBtn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
          Επανάληψη
        </button>
        <button id="backBtn" class="btn btn-outline">Επιστροφή στα Κουίζ</button>
        <button id="pdfBtn" class="btn btn-outline" style="border-color: var(--primary); color: var(--primary);">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Αποθήκευση ως PDF
        </button>
      </div>

      <!-- Review Section -->
      <div class="review-section">
        <h3 class="review-title-text">Αναλυτικά Αποτελέσματα</h3>
        <div id="reviewContainer" style="display: flex; flex-direction: column; gap: 15px; text-align: left; width: 100%;">
          <!-- Review items populated by JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- Embedded Quiz Data & Core Script -->
  <script>
    const QUIZZES = [{"title": "Quiz Πρώτης Ενότητας: Εισαγωγή στη Φιλοσοφία της Νόησης", "filename": "Νόηση Quiz 1_5490d7e7-5ff4-418b-aac2-961964acad71.docx", "questions": [{"id": 1, "text": "Στη φιλοσοφία θεωρούμε ότι ο όρος «νοημοσύνη» (intelligence) περιγράφει κυρίως:", "options": ["Τη νοητική ικανότητα που είναι συνδεδεμένη με τη μάθηση και την κατανόηση των συνθηκών διαβίωσης", "Την ικανότητα ενός ζώου ή μιας μηχανής να σκέφτεται και να λαμβάνει αποφάσεις", "Την ικανότητα μιας βιολογικής ή τεχνητής οντότητας να επιτυγχάνει πολύπλοκους στόχους, η οποία είναι άρρηκτα συνδεδεμένη με την υπολογιστική λειτουργία", "Την ικανότητα κατανόησης των προβλημάτων και την επίλυσή τους μέσω μιας ορθολογικής διαδικασίας, ικανότητα που διαθέτουν μόνο οι άνθρωποι και τα ανώτερα θηλαστικά"], "correct_idx": 2}, {"id": 2, "text": "Οι γνωσιακές επιστήμες μελετούν:", "options": ["Τη συμπεριφορά", "Τις υπολογιστικές και γνωσιακές λειτουργίες", "Το I.Q.", "Τα εγκεφαλικά κύτταρα, δηλαδή τους νευρώνες, καθώς και τις συνάψεις τους"], "correct_idx": 1}, {"id": 3, "text": "Σε τι διαφέρουν τα επίπεδα περιγραφής συμπεριφοράς και υπολογιστικών και γνωσιακών λειτουργιών;", "options": ["Το επίπεδο περιγραφής της συμπεριφοράς έχει ως αντικείμενο τη λεκτική και σωματική απόκριση στα ερεθίσματα του περιβάλλοντος, ενώ το επίπεδο περιγραφής των γνωσιακών λειτουργιών έχει ως αντικείμενο τους μηχανισμούς που προκαλούν τις συμπεριφορές", "Το επίπεδο περιγραφής της συμπεριφοράς έχει ως αντικείμενο τη διαβίωση των ζώων στο φυσικό περιβάλλον, ενώ το επίπεδο περιγραφής των γνωσιακών λειτουργιών έχει ως αντικείμενο την μελέτη του τρόπου επικοινωνίας", "Το επίπεδο περιγραφής της συμπεριφοράς έχει ως αντικείμενο μόνο τη σωματική απόκριση στα ερεθίσματα, ενώ το επίπεδο περιγραφής των γνωσιακών λειτουργιών έχει ως αντικείμενο την συναισθηματική και διανοητική ανταπόκριση στα ερεθίσματα του περιβάλλοντος", "Τα δύο επίπεδα περιγραφής δεν διαφέρουν"], "correct_idx": 0}, {"id": 4, "text": "Ο συμπεριφορισμός μελετά: ρετικά επικριτικός απέναντι σε αυτούς που υποστήριζαν ότι τα ζώα έχουν νου, λέγοντας ότι τίποτα δεν είναι πιο γελοίο από το να λέμε ότι τα ζώα είναι προικισμένα με σκέψη και λογική, όπως και ο άνθρωπος", "Ο Λοκ υποστήριξε ότι τα ζώα δεν μπορούν να σκέφτονται, επειδή οι λέξεις είναι απαραίτητες για την κατανόηση των καθολικών εννοιών"], "correct_idx": 2}, {"id": 8, "text": "Σε τι διαφέρουν τα επίπεδα περιγραφής γνωσιακών λειτουργιών και νευρωνικών λειτουργιών;", "options": ["Το επίπεδο περιγραφής των γνωσιακών λειτουργιών ασχολείται με τη μελέτη μηχανισμών όπως η μάθηση, η μνήμη και η λήψη αποφάσεων, ενώ το επίπεδο περιγραφής των νευρωνικών λειτουργιών εστιάζει στις διεργασίες των εγκεφαλικών κυττάρων και στις συνάψεις τους.", "Το επίπεδο περιγραφής των γνωσιακών λειτουργιών εστιάζει αποκλειστικά στη σωματική απόκριση στα ερεθίσματα, ενώ το επίπεδο περιγραφής των νευρωνικών λειτουργιών εξετάζει τις αντιδράσεις του κεντρικού νευρικού συστήματος.", "Το επίπεδο περιγραφής των γνωσιακών λειτουργιών εξετάζει την επικοινωνία μεταξύ ζώων, ενώ το επίπεδο περιγραφής των νευρωνικών λειτουργιών εξετάζει τη νευρωνική δραστηριότητα που προκύπτει κατά τη διάρκεια αυτής της επικοινωνίας.", "Τα επίπεδα περιγραφής γνωσιακών και νευρωνικών λειτουργιών δεν διαφέρουν, καθώς και τα δύο μελετούν τις ίδιες φυσιολογικές διεργασίες."], "correct_idx": 0}, {"id": 9, "text": "Στη φιλοσοφία θεωρούμε ότι ο όρος «νόηση» (cognition) περιγράφει κυρίως:", "options": ["Την ικανότητα ενός οργανισμού να αντιλαμβάνεται, να μαθαίνει, να κατανοεί, να σκέφτεται, να προβαίνει σε αξιολογικές κρίσεις και να λαμβάνει αποφάσεις, να νοηματοδοτεί τον κόσμο του", "Την ικανότητα του ζώου να προσαρμόζεται στο φυσικό περιβάλλον του, να επικοινωνεί με τα άλλα ζώα και να καταφέρνει να επιβιώνει", "Τη νοημοσύνη των ζώων που αποδεικνύεται από την επίλυση σύνθετων προβλημάτων και την αυτοσυνειδησία", "Την ικανότητα ενός ζώου να επιτυγχάνει πολύπλοκους στόχους, μια ικανότητα που είναι άρρηκτα συνδεδεμένη με την υπολογιστική x": 0}, {"text": "Τι είναι τα qualia;", "options": ["Οι άρρητες υποκειμενικές ποιότητες της εμπειρίας, όπως η αίσθηση του κόκκινου χρώματος", "Οι βασικές αισθήσεις που δημιουργούν τις συνειδητές εμπειρίες, όπως η όραση και η ακοή", "Οι νευρολογικές διεργασίες που συνδέονται με τη δημιουργία των αισθητηριακών αντιλήψεων", "Οι έννοιες και οι κατηγορίες μέσω των οποίων κατανοούμε τον κόσμο"], "correct_idx": 0}, {"text": "Τι είναι τα φιλοσοφικά ζόμπι;", "options": ["Νοητές οντότητες που έχουν μόνο συνείδηση, αλλά στερούνται οποιασδήποτε φυσικής μορφής ή εγκεφαλικής λειτουργίας", "Υποθετικές οντότητες που είναι πανομοιότυπες με τους ανθρώπους σε μορφή, φυσιολογία και συμπεριφορά, αλλά δεν έχουν καθόλου συνειδητές - υποκειμενικές εμπειρίες", "Πλάσματα της φαντασίας που χρησιμοποιούνται ως σημεία αναφοράς ή παραδείγματα σε φιλοσοφικές αλληγορίες για να δείξουν την ανωτερότητα της ανθρώπινης λογικής ή να τονίσουν τα επιχειρήματα", "Οργανισμοί που συμπεριφέρονται αυτόματα, διατηρώντας «αθάνατες» νοητικές ικανότητες, όπως οι αιώνιες φιλοσοφικές ιδέες;"], "correct_idx": 1}, {"text": "Ποιο είναι το βασικό επιχείρημα του Thomas Nagel στην επιδραστική δημοσίευση «Πώς είναι να είσαι νυχτερίδα;»;", "options": ["Ότι η συνείδηση είναι μια απλή εγκεφαλική λειτουργία που εξηγείται πλήρως μέσω των νευρωνικών διεργασιών", "Ότι κάθε οργανισμός με συνείδηση βρίσκεται σε μια κατάσταση συνείδησης τέτοια, που το περιεχόμενό της εξισώνεται με το πώς «βιώνει» ο συγκεκριμένος οργανισμός το περιβάλλον του", "Ότι η μελέτη της συμπεριφοράς ενός οργανισμού παρέχει όλες τις απαραίτητες πληροφορίες για την κατανόηση των νοητικών του καταστάσεων", "Ότι η συνείδηση μπορεί να εξηγηθεί μέσω της απλής ανάλυσης των αισθήσεων και των ερεθισμάτων που λαμβάνει ένας οργανισμός από το περιβάλλον του"], "correct_idx": 1}, {"text": "Τι χρησιμοποιούν οι νυχτερίδες για να πλοηγηθούν στον αέρα και να πιάσουν την τροφή τους;", "options": ["Σύστημα Υπερήχων", "Ηλεκτρομαγνητικά κύματα", "Νυχτερινή Όραση", "Σύστημα ανίχν     const questionTitle = document.getElementById('questionTitle');
    const optionsList = document.getElementById('optionsList');
    const nextBtn = document.getElementById('nextBtn');
    
    const scoreNumber = document.getElementById('scoreNumber');
    const scoreFill = document.getElementById('scoreFill');
    const resultFeedbackTitle = document.getElementById('resultFeedbackTitle');
    const resultFeedbackText = document.getElementById('resultFeedbackText');
    const reviewContainer = document.getElementById('reviewContainer');
    const resultsQuizTitle = document.getElementById('resultsQuizTitle');
    
    const restartBtn = document.getElementById('restartBtn');
    const backBtn = document.getElementById('backBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    const soundToggle = document.getElementById('soundToggle');
    const soundOnIcon = document.getElementById('soundOnIcon');
    const soundMutedIcon = document.getElementById('soundMutedIcon');

    // Shuffle Helper (Fisher-Yates)
    function shuffleArray(array) {
      let shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // Initialize Dashboard
    function initDashboard() {
      dashboardSection.innerHTML = '';
      
      // Render the 7 standard quizzes (indices 0 to 6)
      QUIZZES.slice(0, 7).forEach((quiz, index) => {
        const card = document.createElement('div');
        card.className = 'card quiz-card';
        card.addEventListener('click', () => startQuiz(index));
        
        // Infer unit number
        let unitText = `Ενότητα ${index + 1}`;
        if (quiz.title.includes('Πρώτης')) unitText = 'Ενότητα 1';
        else if (quiz.title.includes('Δεύτερης')) unitText = 'Ενότητα 2';
        else if (quiz.title.includes('Τρίτης')) unitText = 'Ενότητα 3';
        else if (quiz.title.includes('Τέταρτης')) unitText = 'Ενότητα 4';
        else if (quiz.title.includes('Πέμπτης')) unitText = 'Ενότητα 5';
        else if (quiz.title.includes('Έκτης')) unitText = 'Ενότητα 6';
        else if (quiz.title.includes('7 και 8')) unitText = 'Ενότητες 7-8';
        
        card.innerHTML = `
          <div>
            <span class="unit-tag">${unitText}</span>
            <h3 class="quiz-card-title">${quiz.title}</h3>
          </div>
          <div class="quiz-meta">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>${quiz.questions.length} Ερωτήσεις</span>
          </div>
        `;
        dashboardSection.appendChild(card);
      });

      // Add General Test Card (takes index 7)
      const card = document.createElement('div');
      card.className = 'card quiz-card';
      card.style.borderColor = 'var(--success)';
      card.style.boxShadow = '0 10px 25px -5px rgba(16, 185, 129, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.3)';
      card.addEventListener('click', () => startQuiz(7));
      card.innerHTML = `
        <div>
          <span class="unit-tag" style="background-color: rgba(16, 185, 129, 0.15); color: var(--success);">Γενικό Τεστ</span>
          <h3 class="quiz-card-title">Γενικό Τεστ (30 τυχαίες ερωτήσεις)</h3>
        </div>
        <div class="quiz-meta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span>30 ερωτήσεις (23 από Ενότητες 1-6, 7 από Ενότητες 7-8)</span>
        </div>
      `;
      dashboardSection.appendChild(card);
    }

    // Sound toggle function
    soundToggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (soundEnabled) {
        soundToggle.classList.remove('muted');
        soundOnIcon.classList.remove('hidden');
        soundMutedIcon.classList.add('hidden');
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      } else {
        soundToggle.classList.add('muted');
        soundOnIcon.classList.add('hidden');
        soundMutedIcon.classList.remove('hidden');
      }
    });

    // Start Quiz
    function startQuiz(quizIdx) {
      if (quizIdx === 7) {
        // Generate random 30-question test:
        // 23 from first 6 quizzes (indices 0 to 5)
        let pdfPool = [];
        for (let i = 0; i < 6; i++) {
          if (QUIZZES[i]) {
            pdfPool = pdfPool.concat(QUIZZES[i].questions);
          }
        }
        const selectedPdfQuestions = shuffleArray(pdfPool).slice(0, 23);
        
        // 7 from the 7th markdown quiz (index 6)
        let mdPool = [];
        if (QUIZZES[6]) {
          mdPool = mdPool.concat(QUIZZES[6].questions);
        }
        const selectedMdQuestions = shuffleArray(mdPool).slice(0, 7);
        
        // Combine (23 + 7 = 30) and shuffle the final set
        const combinedQuestions = shuffleArray([...selectedPdfQuestions, ...selectedMdQuestions]);
        
        QUIZZES[7] = {
          title: "Γενικό Τεστ (30 τυχαίες ερωτήσεις)",
          questions: combinedQuestions
        };
      }

      currentQuizIndex = quizIdx;
      currentQuestionIndex = 0;
      userAnswers = [];
      correctCount = 0;
      isAnswered = false;
      
      dashboardSection.classList.add('hidden');
      resultsSection.classList.add('hidden');
      quizSection.classList.remove('hidden');
      
      const quiz = QUIZZES[currentQuizIndex];
      if (currentQuizIndex === 7) {
        quizUnitText.textContent = "ΓΕΝΙΚΟ ΤΕΣΤ";
      } else if (currentQuizIndex === 6) {
        quizUnitText.textContent = "ΕΝΟΤΗΤΕΣ 7-8";
      } else {
        let unitNum = currentQuizIndex + 1;
        quizUnitText.textContent = `ΕΝΟΤΗΤΑ ${unitNum}`;
      }
      
      loadQuestion();
    }

    // Load Question
    function loadQuestion() {
      const quiz = QUIZZES[currentQuizIndex];
      const q = quiz.questions[currentQuestionIndex];
      isAnswered = false;
      nextBtn.disabled = true;
      
      progressText.textContent = `Ερώτηση ${currentQuestionIndex + 1} από ${quiz.questions.length}`;
      const progressPercent = (currentQuestionIndex / quiz.questions.length) * 100;
      progressBar.style.width = `${progressPercent}%`;
      
      questionTitle.textContent = q.text;
      optionsList.innerHTML = '';
      
      q.options.forEach((option, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        const markerChar = String.fromCharCode(65 + idx);
        
        btn.innerHTML = `
          <span class="option-marker">${markerChar}</span>
          <span>${option}</span>
        `;
        
        btn.addEventListener('click', () => selectOption(idx, btn));
        optionsList.appendChild(btn);
      });
    }

    // Select Option
    function selectOption(optionIdx, buttonEl) {
      if (isAnswered) return;
      isAnswered = true;
      userAnswers.push(optionIdx);
      
      const quiz = QUIZZES[currentQuizIndex];
      const q = quiz.questions[currentQuestionIndex];
      const correctIdx = q.correct_idx;
      const isCorrect = (optionIdx === correctIdx);
      
      if (isCorrect) {
        correctCount++;
        buttonEl.classList.add('selected-correct');
        playSound('correct');
      } else {
        buttonEl.classList.add('selected-incorrect');
        buttonEl.classList.add('shake');
        playSound('incorrect');
        
        const correctBtn = optionsList.children[correctIdx];
        if (correctBtn) {
          correctBtn.classList.add('correct-reveal');
        }
      }
      
      Array.from(optionsList.children).forEach(btn => {
        btn.disabled = true;
      });
      
      nextBtn.disabled = false;
    }

    // Next Question Button Click
    nextBtn.addEventListener('click', () => {
      const quiz = QUIZZES[currentQuizIndex];
      currentQuestionIndex++;
      
      if (currentQuestionIndex < quiz.questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    // Show Results
    function showResults() {
      quizSection.classList.add('hidden');
      resultsSection.classList.remove('hidden');
      
      const quiz = QUIZZES[currentQuizIndex];
      
      if (resultsQuizTitle) {
        resultsQuizTitle.textContent = quiz.title;
      }
      
      const totalQuestions = quiz.questions.length;
      const scorePercent = Math.round((correctCount / totalQuestions) * 100);
      
      scoreNumber.textContent = `${scorePercent}%`;
      
      const strokeOffset = 440 - (440 * scorePercent) / 100;
      setTimeout(() => {
        scoreFill.style.strokeDashoffset = strokeOffset;
      }, 100);
      
      if (scorePercent === 100) {
        resultFeedbackTitle.textContent = "Άριστα! 🎉";
        resultFeedbackText.textContent = "Απαντήσατε σωστά σε όλες τις ερωτήσεις! Έχετε κατανοήσει πλήρως την ενότητα αυτή.";
      } else if (scorePercent >= 80) {
        resultFeedbackTitle.textContent = "Εξαιρετική Προσπάθεια! ✨";
        resultFeedbackText.textContent = `Πετύχατε ${correctCount} στις ${totalQuestions} σωστές απαντήσεις. Πολύ καλή γνώση του αντικειμένου!`;
      } else if (scorePercent >= 50) {
        resultFeedbackTitle.textContent = "Πολύ Καλά! 👍";
        resultFeedbackText.textContent = `Πετύχατε ${correctCount} στις ${totalQuestions} σωστές απαντήσεις. Έχετε καλή βάση, αλλά μπορείτε να βελτιωθείτε.`;
      } else {
        resultFeedbackTitle.textContent = "Χρειάζεται Μελέτη! 📚";
        resultFeedbackText.textContent = `Πετύχατε μόνο ${correctCount} στις ${totalQuestions} σωστές απαντήσεις. Σας προτείνουμε να ξαναδιαβάσετε τις σημειώσεις και να δοκιμάσετε ξανά.`;
      }
      
      reviewContainer.innerHTML = '';
      quiz.questions.forEach((q, idx) => {
        const userChoiceIdx = userAnswers[idx];
        const correctIdx = q.correct_idx;
        const isUserCorrect = (userChoiceIdx === correctIdx);
        
        const reviewItem = document.createElement('div');
        reviewItem.className = 'review-item';
        
        let optionsMarkup = '';
        q.options.forEach((opt, optIdx) => {
          const optMarker = String.fromCharCode(65 + optIdx);
          let optClass = 'review-opt-neutral';
          let statusIndicator = '';
          
          if (optIdx === correctIdx) {
            optClass = 'review-opt-correct';
            statusIndicator = ' (Σωστό)';
          } else if (optIdx === userChoiceIdx && !isUserCorrect) {
            optClass = 'review-opt-incorrect';
            statusIndicator = ' (Η επιλογή σας)';
          }
          
          optionsMarkup += `
            <div class="review-opt ${optClass}">
              <span class="review-opt-marker">${optMarker}.</span>
              <span>${opt}${statusIndicator}</span>
            </div>
          `;
        });
        
        reviewItem.innerHTML = `
          <div class="review-item-q">${idx + 1}. ${q.text}</div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            ${optionsMarkup}
          </div>
        `;
        reviewContainer.appendChild(reviewItem);
      });
    }

    // Restart Quiz
    restartBtn.addEventListener('click', () => {
      startQuiz(currentQuizIndex);
    });

    // Go Back to Dashboard
    backBtn.addEventListener('click', () => {
      resultsSection.classList.add('hidden');
      quizSection.classList.add('hidden');
      dashboardSection.classList.remove('hidden');
      initDashboard();
    });

    // Save Results as PDF
    pdfBtn.addEventListener('click', () => {
      window.print();
    });

    // Initialize Page
    initDashboard();
  </script>
</body>
</html>
